benchmark:
  name: "hello-world-api"
  description: "A simple REST API that returns personalized Hello messages"
  type: server  # server | cli
  source_language: python
  target_language: java

source:
  language: python
  description: "Flask-based REST API"

  # Build phase
  install_cmd: "pip install -r requirements.txt"  # Install dependencies
  build_cmd: null  # Python doesn't need compilation

  # Server runtime
  run_cmd: "python app.py"  # Command to start the server
  port: 3000  # Port the server listens on
  port_env_var: "SERVER_PORT"  # Env var the app reads for port
  startup_wait: 3  # Seconds to wait for server startup

destination:
  language: java
  description: "Spring Boot-based REST API"


  # Version requirements
  java_version: "17"
  spring_boot_version: "3.2.0"
  
  # Build phase
  install_cmd: null  # Maven handles dependencies during build
  build_cmd: "mvn clean package -DskipTests"  # Compile and package

  # Server runtime
  run_cmd: "java -jar target/*.jar"  # Command to start the server
  port: 3000  # Port the server listens on
  port_env_var: "SERVER_PORT"  # Env var the app reads for port
  startup_wait: 8  # Seconds to wait for server startup

testing:
  tool: pytest
  test_files:
    - "test_api.py"
  test_dir: "tests"
