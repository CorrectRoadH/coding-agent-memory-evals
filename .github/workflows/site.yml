# 守卫:防止把「空报告」部署到线上。
#
# 线上站点(Vercel)直接静态托管 site/ 目录,没有构建步骤 —— site/index.html 是本地
# `npm run report` 生成后提交进仓库的快照。历史上出过一次:数据在 .gitignore 的 .niceeval/ 里,
# 生成时数据不在,于是提交了一份「No summary.json / Pass Rate 0%」的空报告,线上看不到数据。
#
# CI 跑不了 eval 本身(跑一轮要付费 sandbox + 密钥),
# 所以这里只做静态校验:提交进仓库的 site/index.html 必须内嵌非空数据。生成靠本地 `npm run report`。

name: site
on:
  push:
    paths:
      - "site/**"
      - ".github/workflows/site.yml"
  pull_request:
    paths:
      - "site/**"
      - ".github/workflows/site.yml"

jobs:
  guard-published-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: site/index.html 必须内嵌非空数据
        run: node scripts/check-site.mjs
