# 临时联调边界：业务代码已使用尚未发布的 NiceEval API（settingsFile、反馈上下文、
# 公共 E2B 模板入口等），本地必须指向 sibling checkout。下次 NiceEval release 后删除
# 这个 override，并把 package.json 的最低版本抬到该 release；Vercel 不读取此 link。
overrides:
  niceeval: link:../niceeval

allowBuilds:
  cpu-features: false
  esbuild: false
  protobufjs: false
  ssh2: false
minimumReleaseAgeExclude:
  - niceeval
